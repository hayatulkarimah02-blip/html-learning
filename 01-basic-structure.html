<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body></body>
</html>

<!-- 
Explanation

<!DOCTYPE html>
Used to tell the browser that this file uses HTML5

<html>
The main tag that wraps all the content of the website

<head> 
Usually contains website settings such as title, meta tags, and CSS links. 
The content inside head will not appear directly on the webpage. 

<meta charset="UTF-8">
Used to support various characters and symbols

<meta name="viewport">
Makes the website responsive on mobile devices

<title>
The title show on the browser tab.

<body>
This is where all visible website content is displayed, 
such as text, image, buttons, and other elements
-->
