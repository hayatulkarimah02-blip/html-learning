<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Heading & Paragraph</title>
  </head>
  <body>
    <!-- This is a heading -->
    <h1>This is a Heading</h1>
    <!-- Headings contain different levels, from h1 (largest) to h6 (smallest) -->
    <!-- This is a paragraph -->
    <p>
      This is a paragraph of text that provides more information about the
      heading above. It can contain multiple sentences and is used to elaborate
      on the topic introduced by the heading.
    </p>
  </body>
</html>
